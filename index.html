<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakupovat CD a DVD</title>
    <style>
        :root { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 20px; background-color: #f5f5f5; color: #333; }
        h1 { text-align: center; }
        hr { border: 1px solid #ccc; margin-bottom: 20px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .product-card { border: 1px solid #bbb; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column;}
        .product-card h2 { margin-top: 0; font-size: 1.2rem; }
        .cd-bg { background-color: #e3f2fd; } 
        .dvd-bg { background-color: #fff3e0; } 
        
        .bold-label { font-weight: bold; }
        .text-green { color: #2e7d32; }
        .text-orange { color: #ef6c00; }
        .text-red { color: #c62828; }
        a { color: #1565c0; text-decoration: underline; }
        
        .btn-blue { background-color: #1976d2; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-top: auto; font-weight: bold; }
        .btn-blue:hover { background-color: #1565c0; }
        .btn-green { background-color: #4caf50; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-gray { background-color: #9e9e9e; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; max-width: 400px; width: 90%; text-align: center;}
        .hidden { display: none !important; }
        
        .qty-controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
        .qty-controls button { width: 30px; height: 30px; font-size: 18px; cursor: pointer; }
        .qty-controls input { width: 60px; height: 26px; text-align: center; font-size: 16px; }
        .error-text { color: red; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .price-text { font-size: 1.1em; font-weight: bold; margin-bottom: 20px; }
        
        .success-tick { font-size: 50px; color: #4caf50; margin: 0; }
        .summary-text { font-size: 0.9em; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Nakupovat CD a DVD</h1>
    <hr>
    <div id="product-container" class="grid-container">
        </div>

    <div id="unavailable-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <p style="font-size: 1.1em;">Tohle zboží momentálně nelze objednat. Děkujeme za pochopení.</p>
            <button class="btn-blue" onclick="document.getElementById('unavailable-modal').classList.add('hidden')">Rozumím</button>
        </div>
    </div>

    <div id="buy-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="buy-title">Koupit XYZ</h3>
            
            <div>
                <span class="bold-label">Počet kusů:</span>
                <div class="qty-controls">
                    <button type="button" id="buy-btn-minus">-</button>
                    <input type="text" id="buy-input" value="1">
                    <button type="button" id="buy-btn-plus">+</button>
                </div>
            </div>

            <span id="buy-error" class="error-text hidden"></span>
            <div id="buy-total" class="price-text">Celková cena: 0 Kč</div>

            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button id="buy-cancel" class="btn-gray">Storno</button>
                <button id="buy-confirm" class="btn-green">Potvrdit objednávku</button>
            </div>
        </div>
    </div>

    <div id="success-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <p class="success-tick">✔</p>
            <h3>Objednávka je přijata!</h3>
            <hr>
            <p class="bold-label" style="text-align: left; margin-bottom: 5px;">Souhrn objednávky:</p>
            <div id="success-summary" class="summary-text"></div>
            <button class="btn-green" style="width: 100%;" onclick="document.getElementById('success-modal').classList.add('hidden')">Dokončit</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC0CGj4rKkFc0l2xQNhmukUrdDwoBJfWo0",
            authDomain: "cddvdprodej.firebaseapp.com",
            databaseURL: "https://cddvdprodej-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "cddvdprodej",
            storageBucket: "cddvdprodej.firebasestorage.app",
            messagingSenderId: "303491881371",
            appId: "1:303491881371:web:6370546d687a78e43da93e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentProducts = {};
        let activeBuyId = null;

        // Naslouchání produktům
        onValue(ref(db, 'products'), (snapshot) => {
            currentProducts = snapshot.val();
            renderProducts();
        });

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            
            const order = ['p1', 'p2', 'p3', 'p4', 'p5', 'p6'];
            
            order.forEach(id => {
                if(!currentProducts || !currentProducts[id]) return;
                const p = currentProducts[id];
                
                let bgClass = p.type === 'cd' ? 'cd-bg' : 'dvd-bg';
                
                let stockHtml = '';
                if (p.stockType === 'skladem') {
                    stockHtml = `<span class="text-green bold-label">${p.stockCount === 1 ? 'poslední kus' : p.stockCount + ' ks'}</span>`;
                } else if (p.stockType === 'naskladnuje') {
                    stockHtml = `<span class="text-orange bold-label">Naskladňuje se</span>`;
                } else {
                    stockHtml = `<span class="text-red bold-label">Vyprodáno, prodej ukončen</span>`;
                }

                let linksHtml = p.links.map(link => `<a href="${link}" target="_blank">ZDE</a>`).join(" a ");

                container.innerHTML += `
                    <div class="product-card ${bgClass}">
                        <h2>${p.name}</h2>
                        <p><span class="bold-label">Cena:</span> ${p.price} Kč</p>
                        <p><span class="bold-label">Skladem:</span> ${stockHtml}</p>
                        <p><span class="bold-label">Více informací:</span> ${linksHtml}</p>
                        <button class="btn-blue" onclick="window.handleBuyClick('${id}')">Koupit</button>
                    </div>
                `;
            });
        }

        const buyModal = document.getElementById('buy-modal');
        const buyInput = document.getElementById('buy-input');
        const buyError = document.getElementById('buy-error');
        const buyTotal = document.getElementById('buy-total');

        window.handleBuyClick = (id) => {
            const p = currentProducts[id];
            if (p.stockType !== 'skladem') {
                document.getElementById('unavailable-modal').classList.remove('hidden');
                return;
            }

            activeBuyId = id;
            document.getElementById('buy-title').innerText = `Koupit ${p.name}`;
            buyInput.value = "1";
            buyError.classList.add('hidden');
            updatePrice();
            buyModal.classList.remove('hidden');
        };

        function updatePrice() {
            const p = currentProducts[activeBuyId];
            let val = buyInput.value.replace(/[^0-9]/g, '');
            buyInput.value = val;
            
            if (val === "") {
                buyTotal.innerText = `Celková cena: 0 Kč`;
                return;
            }

            let num = parseInt(val);
            buyError.classList.add('hidden');

            if (num === 0) {
                num = 1;
                buyInput.value = "1";
                buyError.innerText = "Nelze koupit 0 kusů!";
                buyError.classList.remove('hidden');
            }

            if (num > p.stockCount) {
                num = p.stockCount;
                buyInput.value = num.toString();
                buyError.innerText = `Skladem je pouze ${p.stockCount} ks!`;
                buyError.classList.remove('hidden');
            }

            buyTotal.innerText = `Celková cena: ${num * p.price} Kč`;
        }

        buyInput.addEventListener('input', updatePrice);

        document.getElementById('buy-btn-plus').addEventListener('click', () => {
            buyInput.value = (parseInt(buyInput.value || "0") + 1).toString();
            updatePrice();
        });

        document.getElementById('buy-btn-minus').addEventListener('click', () => {
            let num = parseInt(buyInput.value || "0") - 1;
            if (num < 0) num = 0; // Ošetří updatePrice automaticky
            buyInput.value = num.toString();
            updatePrice();
        });

        document.getElementById('buy-cancel').addEventListener('click', () => {
            buyModal.classList.add('hidden');
        });

        document.getElementById('buy-confirm').addEventListener('click', () => {
            const p = currentProducts[activeBuyId];
            let qty = parseInt(buyInput.value);
            if(isNaN(qty) || qty <= 0) return; // Pojistka

            let total = qty * p.price;
            let newStock = p.stockCount - qty;
            
            let updates = {};
            if (newStock <= 0) {
                updates = { stockCount: 0, stockType: 'naskladnuje' };
            } else {
                updates = { stockCount: newStock };
            }

            // Odeslání do databáze (snížení skladu a založení objednávky)
            update(ref(db, 'products/' + activeBuyId), updates).then(() => {
                push(ref(db, 'orders'), {
                    productName: p.name,
                    qty: qty,
                    totalPrice: total,
                    timestamp: Date.now()
                }).then(() => {
                    // Zobrazení úspěchu
                    buyModal.classList.add('hidden');
                    document.getElementById('success-summary').innerHTML = `
                        ${p.name}<br>
                        Počet kusů: ${qty}<br>
                        <strong>K úhradě: ${total} Kč</strong>
                    `;
                    document.getElementById('success-modal').classList.remove('hidden');
                });
            });
        });
    </script>
</body>
</html>
